npc-created: "<green>NPC <white>{id}</white> создан."
npc-removed: "<green>NPC <white>{id}</white> удален."
npc-not-found: "<red>NPC <white>{id}</white> не найден."
npc-exists: "<red>NPC <white>{id}</white> уже существует."
