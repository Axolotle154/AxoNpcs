prefix: "<gradient:#2de2e6:#00ffa3><bold>AxoNPCs</bold></gradient> <dark_gray>|</dark_gray> "
no-permission: "<red>You do not have permission."
player-only: "<red>This command can only be used by a player."
invalid-usage: "<red>Invalid usage. Use <white>{usage}</white>."
unknown-command: "<red>Unknown command. Use <white>/npc help</white>."
reload: "<green>Reloaded {count} NPCs from individual YAML files."
version: "<white>AxoNPCs <aqua>{version}</aqua> running on <gray>{server}</gray>."
featureflags: "<white>Feature flags: <gray>{flags}</gray>"
migrate-fancynpcs-success: "<green>FancyNpcs migration complete: <white>{imported}</white> imported, <yellow>{skipped}</yellow> skipped, <red>{failed}</red> failed. <gray>{file}</gray>"
migrate-fancynpcs-failed: "<red>Could not migrate FancyNpcs: <white>{error}</white>"
npc-created: "<green>NPC <white>{id}</white> created."
npc-removed: "<green>NPC <white>{id}</white> removed."
npc-not-found: "<red>NPC <white>{id}</white> was not found."
npc-exists: "<red>NPC <white>{id}</white> already exists."
npc-invalid-id: "<red>Invalid NPC ID. Use letters, numbers, underscores and dashes only."
npc-list-empty: "<yellow>No NPCs are registered."
npc-list-header: "<white>NPCs <gray>({count})</gray>:"
npc-list-entry: "<gray>-</gray> <aqua>{id}</aqua> <dark_gray>[{type}]</dark_gray> <gray>{world} {x} {y} {z}</gray>"
npc-info: "<aqua>{id}</aqua> <gray>type={type} world={world} x={x} y={y} z={z} yaw={yaw} pitch={pitch} viewers={viewers}</gray>"
npc-updated: "<green>NPC <white>{id}</white> updated."
npc-teleported: "<green>Teleported to <white>{id}</white>."
npc-skin-loading: "<yellow>Resolving skin <white>{skin}</white>..."
npc-skin-failed: "<red>Could not resolve skin <white>{skin}</white>."
npc-action-added: "<green>Action added to <white>{id}</white>."
npc-action-removed: "<green>Action removed from <white>{id}</white>."
npc-action-list-empty: "<yellow>No actions for this trigger."
npc-action-list-entry: "<gray>{index}.</gray> <aqua>{type}</aqua> <white>{value}</white>"
npc-cooldown: "<yellow>Please wait <white>{seconds}s</white> before interacting again."
help-1: "<white>/npc create <id> [--position <x y z>] [--world <world>] [--type <type>]"
help-2: "<white>/npc remove <id> <gray>|</gray> /npc list <gray>|</gray> /npc info <id>"
help-3: "<white>/npc displayname|skin|glowing|collidable|scale <id> ..."
help-4: "<white>/npc movehere|moveto|center|rotate|nearby|teleport <id>"
help-5: "<white>/npc turn_to_player <id> [true|false] <gray>|</gray> /npc turn_to_player_distance <id> [distance]"
help-6: "<white>/npc action <id> <trigger> add|list|remove ..."
