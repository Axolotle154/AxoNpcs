prefix: "<gradient:#2de2e6:#00ffa3><bold>AxoNPCs</bold></gradient> <dark_gray>|</dark_gray> "
no-permission: "<red>No tienes permiso."
player-only: "<red>Este comando solo puede usarlo un jugador."
invalid-usage: "<red>Uso invalido. Usa <white>{usage}</white>."
unknown-command: "<red>Comando desconocido. Usa <white>/npc help</white>."
reload: "<green>Recargados {count} NPCs desde archivos YAML individuales."
version: "<white>AxoNPCs <aqua>{version}</aqua> ejecutandose en <gray>{server}</gray>."
featureflags: "<white>Feature flags: <gray>{flags}</gray>"
npc-created: "<green>NPC <white>{id}</white> creado."
npc-removed: "<green>NPC <white>{id}</white> eliminado."
npc-not-found: "<red>No se encontro el NPC <white>{id}</white>."
npc-exists: "<red>El NPC <white>{id}</white> ya existe."
npc-invalid-id: "<red>ID invalido. Usa solo letras, numeros, guiones bajos y guiones."
npc-list-empty: "<yellow>No hay NPCs registrados."
npc-list-header: "<white>NPCs <gray>({count})</gray>:"
npc-list-entry: "<gray>-</gray> <aqua>{id}</aqua> <dark_gray>[{type}]</dark_gray> <gray>{world} {x} {y} {z}</gray>"
npc-info: "<aqua>{id}</aqua> <gray>tipo={type} mundo={world} x={x} y={y} z={z} yaw={yaw} pitch={pitch} viewers={viewers}</gray>"
npc-updated: "<green>NPC <white>{id}</white> actualizado."
npc-teleported: "<green>Teletransportado a <white>{id}</white>."
npc-skin-loading: "<yellow>Resolviendo skin <white>{skin}</white>..."
npc-skin-failed: "<red>No se pudo resolver la skin <white>{skin}</white>."
npc-action-added: "<green>Accion agregada a <white>{id}</white>."
npc-action-removed: "<green>Accion eliminada de <white>{id}</white>."
npc-action-list-empty: "<yellow>No hay acciones para este trigger."
npc-action-list-entry: "<gray>{index}.</gray> <aqua>{type}</aqua> <white>{value}</white>"
npc-cooldown: "<yellow>Espera <white>{seconds}s</white> antes de interactuar de nuevo."
help-1: "<white>/npc create <id> [--position <x y z>] [--world <world>] [--type <type>]"
help-2: "<white>/npc remove <id> <gray>|</gray> /npc list <gray>|</gray> /npc info <id>"
help-3: "<white>/npc displayname|skin|glowing|collidable|scale <id> ..."
help-4: "<white>/npc movehere|moveto|rotate|nearby|teleport <id>"
help-5: "<white>/npc action <id> <trigger> add|list|remove ..."
